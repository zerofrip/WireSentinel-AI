name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: WireSentinel-AI

      - name: Checkout WireSentinel (shared-types)
        uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel
          path: WireSentinel

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: WireSentinel-AI

      - name: Run workspace tests
        working-directory: WireSentinel-AI
        run: cargo test --workspace
